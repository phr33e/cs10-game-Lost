name: Build and Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            asset_name: Mediterranean_Journey_mac.zip
            artifact_name: macos-build
            pyinstaller_args: --windowed
          - os: windows-latest
            asset_name: Mediterranean_Journey_windows.zip
            artifact_name: windows-build
            pyinstaller_args: --windowed
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build app
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --clean --name "Mediterranean Journey" ${{ matrix.pyinstaller_args }} game.py

      - name: Package macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist
          zip -r "../${{ matrix.asset_name }}" "Mediterranean Journey.app"

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\Mediterranean Journey" -DestinationPath "${{ matrix.asset_name }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
